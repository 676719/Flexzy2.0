<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexzy Games</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');

html, body{
    height:100%;
}

body{
    margin:0;
    min-height:100vh;
    background: radial-gradient(circle at top,
        #001a1f,
        #1b5669 60%,
        #050505);
    color:#e0e0e0;
    font-family:'Orbitron',sans-serif;
    text-align:center;
}

/* ===== LOADING SCREEN ===== */
#loadingScreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;

    background: radial-gradient(circle at top,
        #000000,
        #182a74 60%,
        #000000);
}

/* animated background */
#loadingScreen::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:linear-gradient(45deg,#00ffcc22,#00aaff22,#ff00ff22);
    animation:moveBg 6s linear infinite;
}

@keyframes moveBg{
    0%{transform:translate(-25%,-25%) rotate(0deg);}
    100%{transform:translate(-25%,-25%) rotate(360deg);}
}

.logo{
    font-size:46px;
    letter-spacing:6px;
    color:#00fff0;
    text-shadow:
        0 0 10px #00fff0,
        0 0 25px #00ff88,
        0 0 35px #0088ff;
    z-index:2;
}

/* BAR */
.loading-bar{
    width:75%;
    height:35px;
    margin-top:40px;
    background:#111;
    border:3px solid #00fff0;
    border-radius:30px;
    overflow:hidden;
    z-index:2;
    box-shadow:0 0 25px #00fff0;
}

/* PROGRESS */
.progress{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00ff88,#00e5ff);
    box-shadow:0 0 20px #00e5ff;
}

/* TEXT */
.subtitle{
    margin-top:20px;
    font-size:14px;
    color:#aaa;
    letter-spacing:3px;
    z-index:2;
    animation:blink 1.5s infinite;
}

@keyframes blink{
    50%{opacity:0.4;}
}

/* ===== MAIN ===== */

h1{
    color:#d0d0d0;
    text-shadow:0 0 10px #888;
    margin:30px 0;
}

.sidebar{
    position:fixed;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    width:220px;
}

#searchGames,
.menu-btn{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    border:2px solid #666;
    background:#1a1a1a;
    color:#d9d9d9;
    box-shadow:0 0 12px #555;
    font-family:'Orbitron',sans-serif;
}

.menu-btn{
    cursor:pointer;
}

.games-grid{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
    margin-left:260px;
    padding:20px;
}

.game-card{
    width:150px;
    height:150px;
    border:2px solid #666;
    border-radius:12px;
    overflow:hidden;
    position:relative;
    cursor:pointer;
}

.game-card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.game-title{
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,.75);
    color:#ddd;
}

#gameArea{
    display:none;
    padding:20px;
}

iframe{
    width:95%;
    height:700px;
    border:2px solid #666;
}

.play-btn{
    padding:12px 20px;
    background:#1a1a1a;
    color:#ddd;
    border:2px solid #666;
    box-shadow:0 0 12px #555;
    font-family:'Orbitron',sans-serif;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen">
    <h1 class="logo">FLEXZY GAMES</h1>

    <div class="loading-bar">
        <div class="progress"></div>
    </div>

    <div class="subtitle">Loading...</div>
</div>

<!-- MAIN -->
<div id="homeScreen">

<div class="sidebar">
    <input type="text" id="searchGames" placeholder="Buscar juego..." onkeyup="searchGames()">

    <button class="menu-btn" onclick="showCategory('game')">Juegos</button>
    <button class="menu-btn" onclick="showCategory('proxy')">Proxy</button>
</div>

<h1>Flexzy Games</h1>

<div class="games-grid">

<!-- PROXYS -->
<div class="game-card" data-category="proxy" onclick="loadGame('PROXY','https://676719.github.io/Proxyhack/')">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRMO6g2UHi9xr_Fth2Xibij4znp9BkdUKT-EQ&s=80">

</div>

<div class="game-card" data-category="proxy" onclick="loadGame('BlockAway','https://blockaway.net/')">

<div class="game-title">BLOCK AWAY</div>
</div>

<div class="game-card" data-category="proxy" onclick="loadGame('ProxySite','https://www.proxysite.com/')">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTefYGWUbc3kTtMfHfkngvkYV4hBxYrrFB56YpZGDA9ug&s=80">
<div class="game-title">PROXY SITE</div>
</div>

<div class="game-card" data-category="proxy" onclick="loadGame('Croxyproxy','https://www.croxyproxy.com/')">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTVxepYYdLtoHUFLAAFHDdDTPWxBa7aYjgfOc2DNXZ0&s=80">
<div class="game-title">Croxyproxy</div>
</div>

<!-- JUEGOS -->
<div class="game-card" data-category="game" onclick="loadGame('Slope','https://slopegame.io/')">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQbkEhpMuX8FeOg_oipY-8bFO-WHOeKf-EKNw&s=80">

<div class="game-card" data-category="game" onclick="loadGame('Krunker','https://krunker.io/')">

<div class="game-card" data-category="game" onclick="loadGame('2D Shooting','https://battledudes.io/')">

<div class="game-card" data-category="game" onclick="loadGame('Paper.io 3D','https://paperio.site/3d/')">

</div>

<div class="game-card" data-category="game" onclick="loadGame('ROCKET','https://rocketgoal.io/')">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSFnNvoMuBTDqyXW9n6uN5pGvdLUUniTk7IJA&s=80">
<div class="game-title">ROCKET GOAL</div>
</div>

  <div class="game-card" data-category="game" onclick="loadGame('FNAF','https://fnaffree.io/')">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRCET8SQgYmNnN8jAnf_5C8H_SPE_97PZf2z69fLM7B&s=80">
<div class="game-title">FNAF</div>
</div>

  <div class="game-card" data-category="game" onclick="loadGame('1v1LOL','https://1v1-lol.gitlab.io/')">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTKN6F4_x-ZFPLH0XLZ8-EbUYP97IQVBMaI-J-bwlotoA&s=80">
<div class="game-title">1v1LOL</div>
</div>

  
</div>
</div>

<!-- GAME AREA -->
<div id="gameArea">
<h2 id="gameTitle"></h2>
<iframe id="gameFrame"></iframe><br><br>
<button class="play-btn" onclick="backToGames()">← Volver</button>
</div>

<script>
function loadGame(title,url){
 document.getElementById('homeScreen').style.display='none';
 document.getElementById('gameArea').style.display='block';
 document.getElementById('gameTitle').textContent=title;
 document.getElementById('gameFrame').src=url;
}

function backToGames(){
 document.getElementById('gameArea').style.display='none';
 document.getElementById('homeScreen').style.display='block';
 document.getElementById('gameFrame').src='';
}

function searchGames(){
 const input=document.getElementById('searchGames').value.toLowerCase();
 document.querySelectorAll('.game-card').forEach(card=>{
   const title=card.querySelector('.game-title').textContent.toLowerCase();
   card.style.display=title.includes(input)?'block':'none';
 });
}

function showCategory(type){
 const cards = document.querySelectorAll('.game-card');

 cards.forEach(card=>{
   const category = card.dataset.category;

   if(type === 'game'){
     card.style.display = category === 'game' ? 'block' : 'none';
   }
   else if(type === 'proxy'){
     card.style.display = category === 'proxy' ? 'block' : 'none';
   }
 });
}

/* LOADING 7s */
window.onload = function(){

 let progress = 0;
 const bar = document.querySelector('.progress');

 const duration = 7000;
 const intervalTime = 50;
 const steps = duration / intervalTime;
 const increment = 100 / steps;

 const interval = setInterval(()=>{
   progress += increment;
   bar.style.width = progress + '%';

   if(progress >= 100){
     clearInterval(interval);

     setTimeout(()=>{
       document.getElementById('loadingScreen').style.display='none';
       showCategory('game');
     },300);
   }
 }, intervalTime);

};
</script>

</body>
</html>
