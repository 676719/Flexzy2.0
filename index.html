<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 SECRET GAMES</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      text-align: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    h1 { 
      font-size: 3rem; 
      margin-bottom: 40px; 
      text-shadow: 0 0 20px #ff00ff; 
      color: #ff00ff;
    }

    .secret-btn {
      background: #ff00ff;
      color: white;
      border: 4px solid #fff;
      padding: 25px 60px;
      font-size: 1.8rem;
      font-family: 'Press Start 2P', cursive;
      cursor: pointer;
      border-radius: 15px;
      margin: 40px auto;
      display: block;
      transition: 0.4s;
      box-shadow: 0 0 30px #ff00ff;
    }
    .secret-btn:hover {
      background: #00ffff;
      color: #000;
      transform: scale(1.1);
      box-shadow: 0 0 50px #00ffff;
    }

    .games-grid {
      display: none;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 25px;
      max-width: 800px;
      margin: 40px auto;
    }
    .game-card {
      background: rgba(255,255,255,0.08);
      border: 3px solid #00ffff;
      border-radius: 15px;
      padding: 25px 15px;
      transition: 0.3s;
      cursor: pointer;
    }
    .game-card:hover {
      transform: scale(1.08);
      box-shadow: 0 0 30px #00ffff;
    }
    .game-card h3 {
      color: #00ffff;
      font-size: 1.4rem;
      margin-bottom: 10px;
    }

    .game-container {
      display: none;
      margin: 30px auto;
      max-width: 1000px;
    }
    .active { display: block !important; }

    iframe {
      width: 100%;
      height: 520px;
      border: 4px solid #fff;
      border-radius: 10px;
      background: #000;
    }

    .buttons {
      margin: 20px 0;
    }
    button {
      background: #ff00ff;
      color: white;
      border: none;
      padding: 14px 28px;
      margin: 8px 5px;
      font-family: 'Press Start 2P', cursive;
      cursor: pointer;
      border-radius: 8px;
      font-size: 1rem;
    }
    button:hover { 
      background: #00ffff; 
      color: #000; 
    }
    
    .fullscreen-btn {
      background: #00ff00;
      font-size: 1.2rem;
      padding: 18px 35px;
      font-weight: bold;
    }
    .fullscreen-btn:hover {
      background: #ffff00;
      color: #000;
    }

    .back-btn { background: #444; }
  </style>
</head>
<body>
  <h1>SECRET GAMES</h1>

  <!-- Botón principal SECRET -->
  <button class="secret-btn" onclick="showSecrets()">
    SECRET
  </button>

  <!-- Lista de juegos secretos -->
  <div class="games-grid" id="secretsMenu">
    <div class="game-card" onclick="playGame('SECRET 1', 'https://slope3unblocked.github.io/')">
      <h3>SECRET 1</h3>
    </div>
    <div class="game-card" onclick="playGame('SECRET 2', 'https://1v1lol-unblocked.bitbucket.io/')">
      <h3>SECRET 2</h3>
    </div>
  </div>

  <!-- Área donde se carga el juego -->
  <div id="gameArea" class="game-container">
    <h2 id="gameTitle" style="margin-bottom: 15px; color: #00ffff;"></h2>
    
    <iframe id="gameFrame" allowfullscreen></iframe>
    
    <div class="buttons">
      <button onclick="openInAboutBlank()" class="fullscreen-btn">
        🌐 ABRIR EN PANTALLA COMPLETA (about:blank)
      </button>
      <button onclick="backToMenu()" class="back-btn">← Volver</button>
    </div>
  </div>

  <script>
    let currentUrl = '';
    let currentTitle = '';

    function showSecrets() {
      document.querySelector('.secret-btn').style.display = 'none';
      document.getElementById('secretsMenu').style.display = 'grid';
    }

    function playGame(title, url) {
      currentTitle = title;
      currentUrl = url;
      
      document.getElementById('secretsMenu').style.display = 'none';
      document.getElementById('gameArea').classList.add('active');
      document.getElementById('gameTitle').textContent = title;
      document.getElementById('gameFrame').src = url;
    }

    function openInAboutBlank() {
      if (!currentUrl) return;
      const newTab = window.open('about:blank', '_blank');
      if (newTab) {
        newTab.document.write(`
          <!DOCTYPE html>
          <html>
          <head>
            <title>${currentTitle}</title>
            <style>
              body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#000; }
              iframe { width:100%; height:100%; border:none; }
            </style>
          </head>
          <body>
            <iframe src="${currentUrl}" allowfullscreen></iframe>
          </body>
          </html>
        `);
        newTab.document.close();
      } else {
        alert("Por favor, permite las ventanas emergentes para abrir en pantalla completa.");
      }
    }

    function backToMenu() {
      document.getElementById('gameFrame').src = '';
      document.getElementById('gameArea').classList.remove('active');
      document.getElementById('secretsMenu').style.display = 'grid';
      currentUrl = '';
      currentTitle = '';
    }
  </script>
</body>
</html>
